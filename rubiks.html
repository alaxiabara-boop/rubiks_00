<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rubik's Cube Trainer</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
    background:#111;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    width:320px;
    background:rgba(0,0,0,.75);
    color:white;
    padding:15px;
    border-radius:12px;
    z-index:100;
}

button{
    margin:3px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.controls{
    margin-top:8px;
}

.guide{
    margin-top:12px;
    font-size:14px;
    line-height:1.5;
}

.move{
    color:#4dd0e1;
    font-weight:bold;
}

#status{
    margin-top:10px;
    color:#7CFC00;
}
</style>
</head>
<body>

<div id="ui">
    <h2>Rubik's Cube Trainer</h2>

    <div class="controls">
        <button onclick="turn('R')">R</button>
        <button onclick="turn('L')">L</button>
        <button onclick="turn('U')">U</button>
        <button onclick="turn('D')">D</button>
        <button onclick="turn('F')">F</button>
        <button onclick="turn('B')">B</button>
    </div>

    <div class="controls">
        <button onclick="scrambleCube()">Scramble</button>
        <button onclick="solveCube()">Solve</button>
    </div>

    <div id="status">Ready</div>

    <div class="guide">
        <h3>Beginner Algorithms</h3>

        <p>
            <span class="move">R U R' U'</span><br>
            Right Trigger
        </p>

        <p>
            <span class="move">U R U' R'</span><br>
            Left Trigger
        </p>

        <p>
            <span class="move">F R U R' U' F'</span><br>
            Cross Helper
        </p>

        <p>
            <span class="move">R U R' U R U2 R'</span><br>
            Beginner OLL
        </p>
    </div>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(6,6,8);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;

const ambient = new THREE.AmbientLight(
0xffffff,
1.5
);

scene.add(ambient);

const dir = new THREE.DirectionalLight(
0xffffff,
2
);

dir.position.set(10,10,10);

scene.add(dir);

const cubies = [];

const COLORS = {
right:0xff0000,
left:0xff8800,
up:0xffffff,
down:0xffff00,
front:0x00ff00,
back:0x0000ff,
inside:0x111111
};

function createCubie(x,y,z){

const geo = new THREE.BoxGeometry(.95,.95,.95);

const mats = [
new THREE.MeshLambertMaterial({
color:x===1?COLORS.right:COLORS.inside
}),
new THREE.MeshLambertMaterial({
color:x===-1?COLORS.left:COLORS.inside
}),
new THREE.MeshLambertMaterial({
color:y===1?COLORS.up:COLORS.inside
}),
new THREE.MeshLambertMaterial({
color:y===-1?COLORS.down:COLORS.inside
}),
new THREE.MeshLambertMaterial({
color:z===1?COLORS.front:COLORS.inside
}),
new THREE.MeshLambertMaterial({
color:z===-1?COLORS.back:COLORS.inside
})
];

const cube = new THREE.Mesh(
geo,
mats
);

cube.position.set(x,y,z);

scene.add(cube);

cubies.push(cube);
}

for(let x=-1;x<=1;x++){
for(let y=-1;y<=1;y++){
for(let z=-1;z<=1;z++){
createCubie(x,y,z);
}
}
}

let moveHistory=[];
let busy=false;

function rotateLayer(axis,layer){

if(busy) return;

busy=true;

const group = new THREE.Group();

scene.add(group);

const selected=[];

cubies.forEach(c=>{

if(
Math.round(c.position[axis])===layer
){
selected.push(c);
group.add(c);
}

});

let angle=0;
const target=Math.PI/2;

function animate(){

angle+=0.08;

group.rotation[axis]=Math.min(
angle,
target
);

if(angle<target){

requestAnimationFrame(
animate
);

}else{

selected.forEach(c=>{

c.applyMatrix4(
group.matrix
);

scene.attach(c);

c.position.x=
Math.round(c.position.x);

c.position.y=
Math.round(c.position.y);

c.position.z=
Math.round(c.position.z);

});

scene.remove(group);

busy=false;
}

}

animate();
}

window.turn=function(face){

moveHistory.push(face);

switch(face){

case 'R':
rotateLayer('x',1);
break;

case 'L':
rotateLayer('x',-1);
break;

case 'U':
rotateLayer('y',1);
break;

case 'D':
rotateLayer('y',-1);
break;

case 'F':
rotateLayer('z',1);
break;

case 'B':
rotateLayer('z',-1);
break;
}

};

window.scrambleCube=function(){

const moves=[
'R','L','U',
'D','F','B'
];

let count=20;
let i=0;

const timer=setInterval(()=>{

turn(
moves[
Math.floor(
Math.random()*moves.length
)
]
);

i++;

if(i>=count){

clearInterval(timer);

document.getElementById(
'status'
).textContent=
'Scrambled';
}

},180);

};

window.solveCube=function(){

const inverse=[...moveHistory]
.reverse();

let i=0;

document.getElementById(
'status'
).textContent=
'Solving...';

const timer=setInterval(()=>{

if(i>=inverse.length){

clearInterval(timer);

moveHistory=[];

document.getElementById(
'status'
).textContent=
'Solved';

return;
}

turn(inverse[i]);

i++;

},220);

};

function animateScene(){

requestAnimationFrame(
animateScene
);

controls.update();

renderer.render(
scene,
camera
);

}

animateScene();

window.addEventListener(
'resize',
()=>{

camera.aspect=
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>
</body>
</html>
